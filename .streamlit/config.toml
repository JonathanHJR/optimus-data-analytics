[browser]
gatherUsageStats = false

[server]
enableXsrfProtection = false
enableCORS = false

[theme]
primaryColor = "#0B5394"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EAF1F8"
textColor = "#1A1A1A"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
baseRadius = "0.5rem"
showSidebarBorder = true
dataframeHeaderBackgroundColor = "#EAF1F8"
metricValueFontWeight = 700
chartCategoricalColors = [
    "#0B5394",
    "#6FA8DC",
    "#38761D",
    "#B45F06",
    "#674EA7",
    "#A64D79",
]

[theme.sidebar]
backgroundColor = "#F3F7FB"
